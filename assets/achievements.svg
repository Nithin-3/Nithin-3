<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" width="960" height="400">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .text-title { font-family: 'Courier New', monospace; fill: #1793d1; font-size: 28px; font-weight: bold; }
      .text-label { font-family: 'Courier New', monospace; fill: #f0f6fc; font-size: 14px; }
      .badge-box { fill: #161b22; stroke: #30363d; stroke-width: 1; }
      .badge-text { font-family: 'Courier New', monospace; fill: #f0f6fc; font-size: 12px; font-weight: bold; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="960" height="400"/>
  
  <!-- Title -->
  <text class="text-title" x="40" y="50">🏆 Achievements</text>
  
  <!-- Achievement Badges -->
  <g id="achievements">
    <!-- Achievement 1: Stars -->
    <rect class="badge-box" x="40" y="80" width="200" height="80" rx="8"/>
    <text x="60" y="110" style="font-size: 28px;">⭐</text>
    <text class="badge-text" x="100" y="105">5 Stars</text>
    <text class="text-label" x="100" y="125" font-size="11">Repositories Starred</text>
    <text class="text-label" x="100" y="140" font-size="11">by Community</text>
    
    <!-- Achievement 2: Commits -->
    <rect class="badge-box" x="280" y="80" width="200" height="80" rx="8"/>
    <text x="300" y="110" style="font-size: 28px;">📊</text>
    <text class="badge-text" x="340" y="105">207 Commits</text>
    <text class="text-label" x="340" y="125" font-size="11">Active Developer</text>
    <text class="text-label" x="340" y="140" font-size="11">in 2026</text>
    
    <!-- Achievement 3: Pull Requests -->
    <rect class="badge-box" x="520" y="80" width="200" height="80" rx="8"/>
    <text x="540" y="110" style="font-size: 28px;">🔀</text>
    <text class="badge-text" x="580" y="105">9 Pull Requests</text>
    <text class="text-label" x="580" y="125" font-size="11">Collaboration</text>
    <text class="text-label" x="580" y="140" font-size="11">Champion</text>
    
    <!-- Achievement 4: Game Dev -->
    <rect class="badge-box" x="760" y="80" width="160" height="80" rx="8"/>
    <text x="775" y="110" style="font-size: 28px;">🎮</text>
    <text class="badge-text" x="815" y="105">Game Dev</text>
    <text class="text-label" x="815" y="125" font-size="11">Specialized in</text>
    <text class="text-label" x="815" y="140" font-size="11">Game Dev</text>
    
    <!-- Achievement 5: Contributions -->
    <rect class="badge-box" x="40" y="200" width="200" height="80" rx="8"/>
    <text x="60" y="230" style="font-size: 28px;">🤝</text>
    <text class="badge-text" x="100" y="225">18 Repos</text>
    <text class="text-label" x="100" y="245" font-size="11">Contributed to</text>
    <text class="text-label" x="100" y="260" font-size="11">Open Source</text>
    
    <!-- Achievement 6: Multi-Stack -->
    <rect class="badge-box" x="280" y="200" width="200" height="80" rx="8"/>
    <text x="300" y="230" style="font-size: 28px;">💻</text>
    <text class="badge-text" x="340" y="225">Multi-Stack</text>
    <text class="text-label" x="340" y="245" font-size="11">C, C++, TypeScript,</text>
    <text class="text-label" x="340" y="260" font-size="11">JavaScript & More</text>
    
    <!-- Achievement 7: Systems -->
    <rect class="badge-box" x="520" y="200" width="200" height="80" rx="8"/>
    <text x="540" y="230" style="font-size: 28px;">🔧</text>
    <text class="badge-text" x="580" y="225">Systems Prog</text>
    <text class="text-label" x="580" y="245" font-size="11">Linux & Low-Level</text>
    <text class="text-label" x="580" y="260" font-size="11">Development</text>
    
    <!-- Achievement 8: Shipped -->
    <rect class="badge-box" x="760" y="200" width="160" height="80" rx="8"/>
    <text x="775" y="230" style="font-size: 28px;">🚀</text>
    <text class="badge-text" x="815" y="225">Shipped!</text>
    <text class="text-label" x="815" y="245" font-size="11">Fighting Game</text>
    <text class="text-label" x="815" y="260" font-size="11">C/SDL3</text>
  </g>
  
  <!-- Footer Stats -->
  <g id="stats-footer">
    <text class="text-label" x="40" y="330" font-size="12">✓ 5 Total Stars  •  207 Commits  •  9 PRs  •  6 Issues  •  18 Contributions</text>
    <text class="text-label" x="40" y="355" font-size="12">✓ Languages: C • C++ • TypeScript • JavaScript • Lua • GDScript</text>
    <text class="text-label" x="40" y="380" font-size="12">✓ Focus: Game Development • Systems Programming • WebRTC & Real-Time Communications</text>
  </g>
</svg>