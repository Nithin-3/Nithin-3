<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" width="960" height="400">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .title { font-family: monospace; fill: #1793d1; font-size: 24px; font-weight: bold; }
      .label { font-family: monospace; fill: #f0f6fc; font-size: 12px; }
      .value { font-family: monospace; fill: #58a6ff; font-size: 13px; font-weight: bold; }
      .badge { fill: #161b22; stroke: #30363d; stroke-width: 1; }
    </style>
  </defs>
  
  <rect class="bg" width="960" height="400"/>
  
  <!-- Title -->
  <text class="title" x="40" y="45">🏆 Achievements</text>
  
  <!-- Row 1 -->
  <g id="row1">
    <!-- Badge 1: Stars -->
    <rect class="badge" x="40" y="70" width="180" height="70" rx="6"/>
    <text x="55" y="95" style="font-size: 24px;">⭐</text>
    <text class="value" x="90" y="95">5 Stars</text>
    <text class="label" x="90" y="110">Repositories Starred</text>
    <text class="label" x="90" y="123">by Community</text>
    
    <!-- Badge 2: Commits -->
    <rect class="badge" x="250" y="70" width="180" height="70" rx="6"/>
    <text x="265" y="95" style="font-size: 24px;">📊</text>
    <text class="value" x="300" y="95">207 Commits</text>
    <text class="label" x="300" y="110">Active Developer</text>
    <text class="label" x="300" y="123">in 2026</text>
    
    <!-- Badge 3: Pull Requests -->
    <rect class="badge" x="460" y="70" width="180" height="70" rx="6"/>
    <text x="475" y="95" style="font-size: 24px;">🔀</text>
    <text class="value" x="510" y="95">9 Pull Requests</text>
    <text class="label" x="510" y="110">Collaboration</text>
    <text class="label" x="510" y="123">Champion</text>
    
    <!-- Badge 4: Game Dev -->
    <rect class="badge" x="670" y="70" width="250" height="70" rx="6"/>
    <text x="685" y="95" style="font-size: 24px;">🎮</text>
    <text class="value" x="720" y="95">Game Developer</text>
    <text class="label" x="720" y="110">Specialized in Game Dev</text>
    <text class="label" x="720" y="123">C/SDL3 Fighting Game</text>
  </g>
  
  <!-- Row 2 -->
  <g id="row2">
    <!-- Badge 5: Contributions -->
    <rect class="badge" x="40" y="180" width="180" height="70" rx="6"/>
    <text x="55" y="205" style="font-size: 24px;">🤝</text>
    <text class="value" x="90" y="205">18 Repos</text>
    <text class="label" x="90" y="220">Contributed to</text>
    <text class="label" x="90" y="233">Open Source</text>
    
    <!-- Badge 6: Multi-Stack -->
    <rect class="badge" x="250" y="180" width="180" height="70" rx="6"/>
    <text x="265" y="205" style="font-size: 24px;">💻</text>
    <text class="value" x="300" y="205">Multi-Stack</text>
    <text class="label" x="300" y="220">C, C++, TypeScript,</text>
    <text class="label" x="300" y="233">JavaScript & More</text>
    
    <!-- Badge 7: Systems -->
    <rect class="badge" x="460" y="180" width="180" height="70" rx="6"/>
    <text x="475" y="205" style="font-size: 24px;">🔧</text>
    <text class="value" x="510" y="205">Systems Prog</text>
    <text class="label" x="510" y="220">Linux & Low-Level</text>
    <text class="label" x="510" y="233">Development</text>
    
    <!-- Badge 8: Shipped -->
    <rect class="badge" x="670" y="180" width="250" height="70" rx="6"/>
    <text x="685" y="205" style="font-size: 24px;">🚀</text>
    <text class="value" x="720" y="205">Shipped!</text>
    <text class="label" x="720" y="220">Fighting Game Project</text>
    <text class="label" x="720" y="233">Rollback Netcode WIP</text>
  </g>
  
  <!-- Stats Footer -->
  <g id="footer">
    <line x1="40" y1="290" x2="920" y2="290" stroke="#30363d" stroke-width="1"/>
    <text class="label" x="40" y="320">✓ 5 Total Stars • 207 Commits • 9 PRs • 6 Issues • 18 Contributions</text>
    <text class="label" x="40" y="345">✓ Languages: C • C++ • TypeScript • JavaScript • Lua • GDScript</text>
    <text class="label" x="40" y="370">✓ Focus: Game Development • Systems Programming • WebRTC & Real-Time Communications</text>
    <text class="label" x="40" y="390" style="fill: #8b949e;">Updated: Real-time from GitHub API</text>
  </g>
</svg>