<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .text-title { font-family: 'Courier New', monospace; fill: #1793d1; font-size: 24px; font-weight: bold; }
      .text-label { font-family: 'Courier New', monospace; fill: #f0f6fc; font-size: 14px; }
      .text-value { font-family: 'Courier New', monospace; fill: #58a6ff; font-size: 16px; font-weight: bold; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="960" height="300"/>
  
  <!-- Title -->
  <text class="text-title" x="40" y="50">💻 Recent Coding Habits</text>
  
  <!-- Stats Section -->
  <g id="stats">
    <text class="text-label" x="40" y="100">Stats</text>
    
    <!-- GitHub Logo placeholder -->
    <circle cx="500" cy="130" r="60" fill="#0d47a1" opacity="0.3"/>
    <circle cx="500" cy="130" r="55" fill="none" stroke="#1793d1" stroke-width="2"/>
    <text x="485" y="145" style="font-size: 40px;">⚙️</text>
    
    <!-- Stats Items -->
    <text class="text-label" x="40" y="125">⭐ Total Stars:</text>
    <text class="text-value" x="280" y="125">5</text>
    
    <text class="text-label" x="40" y="155">📊 2026 Commits:</text>
    <text class="text-value" x="280" y="155">207</text>
    
    <text class="text-label" x="40" y="185">🔀 Total PRs:</text>
    <text class="text-value" x="280" y="185">9</text>
    
    <text class="text-label" x="40" y="215">📝 Total Issues:</text>
    <text class="text-value" x="280" y="215">6</text>
    
    <text class="text-label" x="40" y="245">🤝 Contributed to:</text>
    <text class="text-value" x="280" y="245">18</text>
  </g>
  
  <!-- Languages Section -->
  <g id="languages">
    <text class="text-label" x="600" y="100">Top Languages by Commit</text>
    
    <!-- Pie Chart -->
    <circle cx="750" cy="160" r="50" fill="#0d47a1" opacity="0.3"/>
    <circle cx="750" cy="160" r="50" fill="none" stroke="#1793d1" stroke-width="35" stroke-dasharray="78.5 314" opacity="0.9"/>
    <circle cx="750" cy="160" r="50" fill="none" stroke="#58a6ff" stroke-width="25" stroke-dasharray="47 314" stroke-dashoffset="-78.5" opacity="0.9"/>
    <circle cx="750" cy="160" r="50" fill="none" stroke="#ffd700" stroke-width="20" stroke-dasharray="31.4 314" stroke-dashoffset="-125.5" opacity="0.9"/>
    <circle cx="750" cy="160" r="50" fill="none" stroke="#7c3aed" stroke-width="15" stroke-dasharray="15.7 314" stroke-dashoffset="-156.9" opacity="0.9"/>
    
    <!-- Legend -->
    <rect x="600" y="220" width="12" height="12" fill="#1793d1"/>
    <text class="text-label" x="620" y="228">TypeScript</text>
    
    <rect x="600" y="245" width="12" height="12" fill="#58a6ff"/>
    <text class="text-label" x="620" y="253">C++</text>
    
    <rect x="720" y="220" width="12" height="12" fill="#ffd700"/>
    <text class="text-label" x="740" y="228">JavaScript</text>
    
    <rect x="720" y="245" width="12" height="12" fill="#7c3aed"/>
    <text class="text-label" x="740" y="253">Lua</text>
  </g>
</svg>