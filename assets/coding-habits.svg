<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .title { font-family: monospace; fill: #1793d1; font-size: 20px; font-weight: bold; }
      .label { font-family: monospace; fill: #f0f6fc; font-size: 13px; }
      .value { font-family: monospace; fill: #58a6ff; font-size: 14px; font-weight: bold; }
    </style>
  </defs>
  
  <rect class="bg" width="960" height="300"/>
  
  <!-- Left Column -->
  <text class="title" x="40" y="40">💻 Coding Habits</text>
  
  <text class="label" x="40" y="80">Stats</text>
  <circle cx="320" cy="100" r="50" fill="none" stroke="#0d47a1" stroke-width="40" opacity="0.4"/>
  <circle cx="320" cy="100" r="50" fill="none" stroke="#1793d1" stroke-width="3"/>
  <text style="font-size: 32px;" x="300" y="115">⚙</text>
  
  <text class="label" x="40" y="130">⭐ Total Stars:</text>
  <text class="value" x="280" y="130">5</text>
  
  <text class="label" x="40" y="160">📊 2026 Commits:</text>
  <text class="value" x="280" y="160">207</text>
  
  <text class="label" x="40" y="190">🔀 Total PRs:</text>
  <text class="value" x="280" y="190">9</text>
  
  <text class="label" x="40" y="220">📝 Total Issues:</text>
  <text class="value" x="280" y="220">6</text>
  
  <text class="label" x="40" y="250">🤝 Contributed to:</text>
  <text class="value" x="280" y="250">18</text>
  
  <!-- Right Column -->
  <text class="title" x="550" y="40">🔤 Top Languages</text>
  
  <g>
    <!-- Pie Chart Background -->
    <circle cx="720" cy="130" r="55" fill="none" stroke="#0d1117" stroke-width="50"/>
    
    <!-- Segments -->
    <circle cx="720" cy="130" r="55" fill="none" stroke="#1793d1" stroke-width="20" stroke-dasharray="85 314" opacity="0.9"/>
    <circle cx="720" cy="130" r="55" fill="none" stroke="#58a6ff" stroke-width="15" stroke-dasharray="50 314" stroke-dashoffset="-85" opacity="0.9"/>
    <circle cx="720" cy="130" r="55" fill="none" stroke="#ffd700" stroke-width="12" stroke-dasharray="35 314" stroke-dashoffset="-135" opacity="0.9"/>
    <circle cx="720" cy="130" r="55" fill="none" stroke="#7c3aed" stroke-width="10" stroke-dasharray="20 314" stroke-dashoffset="-170" opacity="0.9"/>
    <circle cx="720" cy="130" r="55" fill="none" stroke="#00d4ff" stroke-width="8" stroke-dasharray="15 314" stroke-dashoffset="-190" opacity="0.9"/>
  </g>
  
  <text class="label" x="550" y="230">TypeScript</text>
  <rect x="550" y="220" width="10" height="10" fill="#1793d1"/>
  
  <text class="label" x="700" y="230">C++</text>
  <rect x="700" y="220" width="10" height="10" fill="#58a6ff"/>
  
  <text class="label" x="550" y="260">JavaScript</text>
  <rect x="550" y="250" width="10" height="10" fill="#ffd700"/>
  
  <text class="label" x="700" y="260">Lua</text>
  <rect x="700" y="250" width="10" height="10" fill="#7c3aed"/>
  
  <text class="label" x="550" y="290">GDScript</text>
  <rect x="550" y="280" width="10" height="10" fill="#00d4ff"/>
</svg>