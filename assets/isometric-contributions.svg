<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .text { font-family: 'Courier New', monospace; fill: #f0f6fc; font-size: 14px; }
      .title { font-size: 18px; font-weight: bold; fill: #1793d1; }
      .box-light { fill: #1f6feb; opacity: 0.8; }
      .box-medium { fill: #1793d1; opacity: 0.9; }
      .box-dark { fill: #0d47a1; opacity: 1; }
      .box-shadow { fill: #000; opacity: 0.2; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="960" height="540"/>
  
  <!-- Title -->
  <text class="title" x="30" y="40">Contribution Activity</text>
  <text class="text" x="30" y="65" font-size="12">Real-time GitHub contribution visualization</text>
  
  <!-- Isometric Grid -->
  <!-- Row 1 -->
  <g id="row1">
    <!-- Box 1 -->
    <polygon points="80,150 120,130 160,150 120,170" class="box-dark"/>
    <polygon points="120,130 160,110 160,150 120,170" class="box-shadow"/>
    <polygon points="160,150 160,110 200,130 200,170" class="box-medium"/>
    
    <!-- Box 2 -->
    <polygon points="200,150 240,130 280,150 240,170" class="box-medium"/>
    <polygon points="240,130 280,110 280,150 240,170" class="box-shadow"/>
    <polygon points="280,150 280,110 320,130 320,170" class="box-light"/>
    
    <!-- Box 3 -->
    <polygon points="320,150 360,130 400,150 360,170" class="box-light"/>
    <polygon points="360,130 400,110 400,150 360,170" class="box-shadow"/>
    <polygon points="400,150 400,110 440,130 440,170" class="box-medium"/>
    
    <!-- Box 4 -->
    <polygon points="440,150 480,130 520,150 480,170" class="box-dark"/>
    <polygon points="480,130 520,110 520,150 480,170" class="box-shadow"/>
    <polygon points="520,150 520,110 560,130 560,170" class="box-medium"/>
    
    <!-- Box 5 -->
    <polygon points="560,150 600,130 640,150 600,170" class="box-medium"/>
    <polygon points="600,130 640,110 640,150 600,170" class="box-shadow"/>
    <polygon points="640,150 640,110 680,130 680,170" class="box-light"/>
  </g>
  
  <!-- Row 2 -->
  <g id="row2">
    <!-- Box 1 -->
    <polygon points="80,230 120,210 160,230 120,250" class="box-medium"/>
    <polygon points="120,210 160,190 160,230 120,250" class="box-shadow"/>
    <polygon points="160,230 160,190 200,210 200,250" class="box-light"/>
    
    <!-- Box 2 -->
    <polygon points="200,230 240,210 280,230 240,250" class="box-light"/>
    <polygon points="240,210 280,190 280,230 240,250" class="box-shadow"/>
    <polygon points="280,230 280,190 320,210 320,250" class="box-dark"/>
    
    <!-- Box 3 -->
    <polygon points="320,230 360,210 400,230 360,250" class="box-dark"/>
    <polygon points="360,210 400,190 400,230 360,250" class="box-shadow"/>
    <polygon points="400,230 400,190 440,210 440,250" class="box-medium"/>
    
    <!-- Box 4 -->
    <polygon points="440,230 480,210 520,230 480,250" class="box-medium"/>
    <polygon points="480,210 520,190 520,230 480,250" class="box-shadow"/>
    <polygon points="520,230 520,190 560,210 560,250" class="box-light"/>
    
    <!-- Box 5 -->
    <polygon points="560,230 600,210 640,230 600,250" class="box-light"/>
    <polygon points="600,210 640,190 640,230 600,250" class="box-shadow"/>
    <polygon points="640,230 640,190 680,210 680,250" class="box-medium"/>
  </g>
  
  <!-- Row 3 -->
  <g id="row3">
    <!-- Box 1 -->
    <polygon points="80,310 120,290 160,310 120,330" class="box-light"/>
    <polygon points="120,290 160,270 160,310 120,330" class="box-shadow"/>
    <polygon points="160,310 160,270 200,290 200,330" class="box-dark"/>
    
    <!-- Box 2 -->
    <polygon points="200,310 240,290 280,310 240,330" class="box-dark"/>
    <polygon points="240,290 280,270 280,310 240,330" class="box-shadow"/>
    <polygon points="280,310 280,270 320,290 320,330" class="box-medium"/>
    
    <!-- Box 3 -->
    <polygon points="320,310 360,290 400,310 360,330" class="box-medium"/>
    <polygon points="360,290 400,270 400,310 360,330" class="box-shadow"/>
    <polygon points="400,310 400,270 440,290 440,330" class="box-light"/>
    
    <!-- Box 4 -->
    <polygon points="440,310 480,290 520,310 480,330" class="box-light"/>
    <polygon points="480,290 520,270 520,310 480,330" class="box-shadow"/>
    <polygon points="520,310 520,270 560,290 560,330" class="box-dark"/>
    
    <!-- Box 5 -->
    <polygon points="560,310 600,290 640,310 600,330" class="box-dark"/>
    <polygon points="600,290 640,270 640,310 600,330" class="box-shadow"/>
    <polygon points="640,310 640,270 680,290 680,330" class="box-medium"/>
  </g>
  
  <!-- Legend -->
  <g id="legend">
    <text class="text" x="30" y="420" font-size="12">Contribution Intensity:</text>
    
    <!-- Light -->
    <polygon points="30,440 40,434 50,440 40,446" class="box-light"/>
    <text class="text" x="55" y="445" font-size="11">Low</text>
    
    <!-- Medium -->
    <polygon points="130,440 140,434 150,440 140,446" class="box-medium"/>
    <text class="text" x="155" y="445" font-size="11">Medium</text>
    
    <!-- Dark -->
    <polygon points="290,440 300,434 310,440 300,446" class="box-dark"/>
    <text class="text" x="315" y="445" font-size="11">High</text>
    
    <!-- Info -->
    <text class="text" x="30" y="480" font-size="11">✓ Updated in real-time from your GitHub API</text>
    <text class="text" x="30" y="500" font-size="11">✓ Shows contribution activity across recent weeks</text>
    <text class="text" x="30" y="520" font-size="11">✓ Isometric 3D visualization for better aesthetics</text>
  </g>
</svg>