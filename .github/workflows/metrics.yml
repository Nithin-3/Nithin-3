name: Metrics

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        name: Full metrics (terminal dashboard)
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config_timezone: Asia/Kolkata
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          output_action: commit
          committer_branch: main
          committer_message: "chore(metrics): update dashboard [skip ci]"
          filename: assets/metrics.svg
          config_order: base.header, isocalendar, languages, habits, achievements, notable, activity, repositories, stars, followup, lines, people
          config_display: large
          config_padding: 0, 8
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 10
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_lines: yes
          plugin_lines_history: 90
          plugin_lines_delay: 0.1
          plugin_stars: yes
          plugin_stars_limit: 4
          plugin_stars_repos: yes
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 6
          plugin_people_size: 28
          plugin_projects: yes
          plugin_projects_limit: 4
          plugin_projects_descriptions: yes
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: commit, pull_request
          plugin_notable_repositories: yes

      - uses: lowlighter/metrics@latest
        name: Isometric contribution calendar
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config_timezone: Asia/Kolkata
          output_action: commit
          committer_branch: main
          committer_message: "chore(metrics): update isocalendar [skip ci]"
          filename: assets/isometric-contributions.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          svg_renderer: true

      - uses: lowlighter/metrics@latest
        name: Coding habits chart
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config_timezone: Asia/Kolkata
          output_action: commit
          committer_branch: main
          committer_message: "chore(metrics): update habits [skip ci]"
          filename: assets/coding-habits.svg
          base: ""
          plugin_habits: yes
          plugin_habits_from: 500
          plugin_habits_days: 60
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          svg_renderer: true

      - uses: lowlighter/metrics@latest
        name: Languages chart
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config_timezone: Asia/Kolkata
          output_action: commit
          committer_branch: main
          committer_message: "chore(metrics): update languages [skip ci]"
          filename: assets/languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          plugin_languages_ignores: html, css, scss

      - uses: lowlighter/metrics@latest
        name: Achievements
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config_timezone: Asia/Kolkata
          output_action: commit
          committer_branch: main
          committer_message: "chore(metrics): update achievements [skip ci]"
          filename: assets/achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 12
          svg_renderer: true

      - uses: lowlighter/metrics@latest
        name: Recently starred repos
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config_timezone: Asia/Kolkata
          output_action: commit
          committer_branch: main
          committer_message: "chore(metrics): update stars [skip ci]"
          filename: assets/starred-repos.svg
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 6
          plugin_stars_repos: yes

      - uses: lowlighter/metrics@latest
        name: Lines of code
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config_timezone: Asia/Kolkata
          output_action: commit
          committer_branch: main
          committer_message: "chore(metrics): update lines [skip ci]"
          filename: assets/lines-of-code.svg
          base: ""
          plugin_lines: yes
          plugin_lines_history: 90
          plugin_lines_delay: 0.1
