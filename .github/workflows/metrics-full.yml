name: Metrics - Full Dashboard

on:
  schedule:
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        name: Full metrics (terminal dashboard)
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config_timezone: Asia/Kolkata
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          output_action: commit
          committer_branch: main
          committer_message: "chore(metrics): update dashboard [skip ci]"
          filename: assets/metrics.svg
          config_order: base.header, isocalendar, activity, repositories, people
          config_display: large
          config_padding: 0, 8
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 6
          plugin_people_size: 28
          plugin_projects: yes
          plugin_projects_limit: 4
          plugin_projects_descriptions: yes

