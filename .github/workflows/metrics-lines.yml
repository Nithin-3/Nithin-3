name: Metrics - Lines of Code

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        name: Lines of code
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config_timezone: Asia/Kolkata
          output_action: commit
          committer_branch: main
          committer_message: "chore(metrics): update lines [skip ci]"
          filename: assets/lines-of-code.svg
          base: ""
          plugin_lines: yes
          plugin_lines_history_limit: 90
          plugin_lines_delay: 0.1
