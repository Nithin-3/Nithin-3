name: Generate Snake

on:
  schedule:
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/snake/github-contribution-grid-snake.svg
            assets/snake/github-contribution-grid-snake-dark.svg?palette=github-dark
            assets/snake/github-contribution-grid-snake.gif?color_snake=#1793d1&color_dots=#0d1117,#161b22,#1793d1,#1f6feb,#58a6ff

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(snake): update contribution snake [skip ci]"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
